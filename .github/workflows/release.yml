name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      # npm >= 11.5.1 is required for OIDC trusted publishing; Node's bundled npm
      # can lag behind, so pin to latest before any publish.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # Opens/updates a "Version Packages" PR; when that PR merges, `publish`
      # runs `changeset publish` to release to npm with provenance.
      - uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
