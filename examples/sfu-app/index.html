<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTCForge — SFU Conference</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
        h1 { font-size: 1.4rem; color: #fff; margin-bottom: 1.5rem; }
        h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }

        #join-form { display: flex; flex-direction: column; gap: 0.75rem; max-width: 320px; }
        input {
            padding: 0.6rem 0.8rem; border-radius: 6px;
            border: 1px solid #333; background: #1a1a1a; color: #e0e0e0;
            font-size: 0.95rem;
        }
        button {
            padding: 0.6rem 1.2rem; border-radius: 6px; border: none;
            background: #3b82f6; color: #fff; font-size: 0.95rem; cursor: pointer;
        }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: default; }
        button.danger { background: #dc2626; }
        button.danger:hover { background: #b91c1c; }
        button.secondary { background: #374151; }
        button.secondary:hover { background: #4b5563; }

        #room-view { display: none; }
        .room-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .room-header h1 { margin: 0; }

        .tag { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; }
        .tag.sfu { background: #1e1b4b; color: #a5b4fc; }
        .tag.peer { background: #1e3a5f; color: #60a5fa; }

        #video-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; min-height: 140px; }
        .video-tile {
            position: relative; width: 240px;
            background: #111; border-radius: 8px; overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .video-tile.local { border-color: #3b82f6; }
        .video-tile.remote { border-color: #6d28d9; }
        .video-tile video {
            width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; background: #0a0a0a;
        }
        .video-tile .video-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 0.25rem 0.5rem; font-size: 0.75rem; color: #fff;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }

        .columns { display: flex; gap: 2rem; flex-wrap: wrap; }
        .panel { flex: 1; min-width: 260px; }

        #peers-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
        #peers-list li {
            padding: 0.4rem 0.75rem; background: #1a1a1a; border-radius: 6px; font-size: 0.9rem;
        }

        #event-log {
            height: 260px; overflow-y: auto; background: #111; border-radius: 6px;
            padding: 0.75rem; font-family: monospace; font-size: 0.82rem;
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .log-entry { padding: 0.2rem 0; border-bottom: 1px solid #1e1e1e; }
        .log-entry .time { color: #555; margin-right: 0.5rem; }
        .log-entry.info { color: #34d399; }
        .log-entry.warn { color: #fbbf24; }
        .log-entry.sfu { color: #a5b4fc; }

        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .empty { color: #555; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>
    <div id="join-form">
        <h1>RTCForge — SFU Conference</h1>
        <input id="peer-id" placeholder="Your name (peer ID)" />
        <input id="room-id" placeholder="Room ID" value="sfu-room-1" />
        <button id="join-btn">Join</button>
        <p style="font-size:0.8rem;color:#555">
            Server: ws://localhost:3006<br/>
            SFU cluster routes rooms to least-loaded node.
        </p>
    </div>

    <div id="room-view">
        <div class="room-header">
            <h1 id="room-title"></h1>
            <span id="sfu-tag" class="tag sfu"></span>
            <span id="peer-tag" class="tag peer"></span>
        </div>

        <div id="video-grid"></div>

        <div class="columns">
            <div class="panel">
                <h2>Peers</h2>
                <ul id="peers-list"><li class="empty">No other peers yet</li></ul>
                <div class="actions">
                    <button id="camera-btn" class="secondary">Toggle Camera</button>
                    <button id="leave-btn" class="danger">Leave</button>
                </div>
            </div>
            <div class="panel">
                <h2>Event Log</h2>
                <div id="event-log"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
