<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTCForge — Video Call Example</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
        h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #fff; }
        h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }

        #join-form { display: flex; flex-direction: column; gap: 0.75rem; max-width: 320px; }
        input {
            padding: 0.6rem 0.8rem; border-radius: 6px;
            border: 1px solid #333; background: #1a1a1a; color: #e0e0e0;
            font-size: 0.95rem;
        }
        button {
            padding: 0.6rem 1.2rem; border-radius: 6px; border: none;
            background: #3b82f6; color: #fff; font-size: 0.95rem; cursor: pointer;
        }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: default; }
        button.danger { background: #dc2626; }
        button.danger:hover { background: #b91c1c; }
        button.secondary { background: #374151; }
        button.secondary:hover { background: #4b5563; }
        button.active { background: #065f46; }
        button.active:hover { background: #047857; }
        button.recording { background: #dc2626; animation: pulse 1.4s ease-in-out infinite; }
        button.recording:hover { background: #b91c1c; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }

        #recording-status {
            display: none; align-items: center; gap: 0.5rem;
            font-size: 0.85rem; color: #f87171; margin-top: 0.5rem;
        }
        #recording-status.active { display: flex; }
        .rec-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #dc2626;
            animation: pulse 1.4s ease-in-out infinite;
        }

        #room-view { display: none; }
        .room-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
        .room-header h1 { margin: 0; }
        .tag { font-size: 0.8rem; background: #1e3a5f; color: #60a5fa; padding: 0.2rem 0.6rem; border-radius: 4px; }

        /* Video grid */
        #video-grid {
            display: flex; flex-wrap: wrap; gap: 0.75rem;
            margin-bottom: 1.5rem; min-height: 140px;
        }
        .video-tile {
            position: relative; width: 220px;
            background: #111; border-radius: 8px; overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .video-tile video {
            width: 100%; display: block;
            aspect-ratio: 16/9; object-fit: cover; background: #0a0a0a;
        }
        .video-tile .video-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 0.25rem 0.5rem; font-size: 0.75rem; color: #fff;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }
        .video-tile.local { border-color: #3b82f6; }
        .video-tile.active-speaker { border-color: #22c55e; box-shadow: 0 0 0 2px #22c55e40; }
        .video-tile.screen-share { border-color: #a855f7; }
        #no-video-hint {
            color: #555; font-size: 0.85rem; font-style: italic;
            align-self: center;
        }

        .columns { display: flex; gap: 2rem; }
        .panel { flex: 1; }

        #peers-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        #peers-list li {
            padding: 0.5rem 0.75rem; background: #1a1a1a; border-radius: 6px;
            font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center;
        }
        #peers-list li button { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
        .empty { color: #555; font-size: 0.9rem; font-style: italic; }

        #signal-log {
            height: 280px; overflow-y: auto; background: #111; border-radius: 6px;
            padding: 0.75rem; font-family: monospace; font-size: 0.82rem;
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .log-entry { padding: 0.25rem 0; border-bottom: 1px solid #1e1e1e; }
        .log-entry .time { color: #555; margin-right: 0.5rem; }
        .log-entry.in { color: #34d399; }
        .log-entry.out { color: #60a5fa; }
        .log-entry.sys { color: #fbbf24; }

        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    </style>
</head>
<body>
    <div id="join-form">
        <h1>RTCForge — Video Call</h1>
        <input id="peer-id" placeholder="Your name (peer ID)" />
        <input id="room-id" placeholder="Room ID" value="test-room" />
        <button id="join-btn">Join Room</button>
        <p style="font-size:0.8rem;color:#555">Signaling server: ws://localhost:3001</p>
    </div>

    <div id="room-view">
        <div class="room-header">
            <h1 id="room-title"></h1>
            <span class="tag" id="my-peer-tag"></span>
        </div>

        <div id="video-grid">
            <p id="no-video-hint">Camera not available</p>
        </div>

        <div class="columns">
            <div class="panel">
                <h2>Peers</h2>
                <ul id="peers-list"><li class="empty">No other peers yet</li></ul>
                <div class="actions">
                    <button id="camera-btn" class="secondary" disabled>Camera</button>
                    <button id="mic-btn" class="secondary" disabled>Mic</button>
                    <button id="record-btn" class="secondary" disabled>Record</button>
                    <button id="pause-rec-btn" class="secondary" disabled>Pause Rec</button>
                    <button id="screen-share-btn" class="secondary" disabled>Share Screen</button>
                    <button id="ping-all-btn" class="secondary">Ping all</button>
                    <button id="leave-btn" class="danger">Leave</button>
                </div>
                <div id="recording-status">
                    <span class="rec-dot"></span>
                    <span>Recording</span>
                    <span id="rec-timer">0:00</span>
                </div>
            </div>
            <div class="panel">
                <h2>Signal Log</h2>
                <div id="signal-log"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
