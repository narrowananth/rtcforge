<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTCForge — Collaborative Whiteboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
        h1 { font-size: 1.3rem; color: #fff; }

        #join-form {
            display: flex; flex-direction: column; gap: 0.75rem;
            max-width: 320px; padding: 2rem;
        }
        input {
            padding: 0.6rem 0.8rem; border-radius: 6px;
            border: 1px solid #333; background: #1a1a1a; color: #e0e0e0;
            font-size: 0.95rem;
        }
        button {
            padding: 0.6rem 1.2rem; border-radius: 6px; border: none;
            background: #3b82f6; color: #fff; font-size: 0.95rem; cursor: pointer;
        }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: default; }
        button.danger { background: #dc2626; }
        button.danger:hover { background: #b91c1c; }
        button.active { background: #065f46; }
        button.active:hover { background: #047857; }

        #app { display: none; flex-direction: column; height: 100vh; }

        #toolbar {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.6rem 1rem; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
            flex-wrap: wrap;
        }
        #toolbar label { font-size: 0.85rem; color: #aaa; }
        #color-picker { width: 36px; height: 32px; border: none; background: none; cursor: pointer; padding: 0; }
        #brush-size { width: 80px; }
        .tool-sep { width: 1px; height: 20px; background: #333; }
        #status { font-size: 0.82rem; color: #555; margin-left: auto; }
        #peers-count { font-size: 0.82rem; color: #34d399; }

        #canvas-wrap {
            flex: 1; overflow: hidden; display: flex; justify-content: center; align-items: center;
            background: #111;
        }
        #wb-canvas {
            background: #fff; cursor: crosshair;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="join-form">
        <h1>RTCForge — Whiteboard</h1>
        <input id="peer-id" placeholder="Your name (peer ID)" />
        <input id="room-id" placeholder="Room ID" value="wb-room-1" />
        <button id="join-btn">Join</button>
        <p style="font-size:0.8rem;color:#555">Server: ws://localhost:3005</p>
    </div>

    <div id="app">
        <div id="toolbar">
            <h1 id="room-title"></h1>
            <div class="tool-sep"></div>
            <label>Color</label>
            <input type="color" id="color-picker" value="#1d4ed8" />
            <label>Size</label>
            <input type="range" id="brush-size" min="1" max="20" value="3" />
            <span id="brush-size-val">3px</span>
            <div class="tool-sep"></div>
            <button id="clear-btn" class="danger">Clear</button>
            <button id="erase-btn" class="secondary">Erase</button>
            <div class="tool-sep"></div>
            <span id="peers-count">1 peer</span>
            <span id="status">Connected</span>
            <button id="leave-btn" class="danger" style="margin-left:auto">Leave</button>
        </div>
        <div id="canvas-wrap">
            <canvas id="wb-canvas" width="1280" height="720"></canvas>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
