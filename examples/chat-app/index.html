<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTCForge — Chat Example</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; }
        h1 { font-size: 1.4rem; color: #fff; }
        h2 { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem; }

        input {
            padding: 0.6rem 0.8rem; border-radius: 6px;
            border: 1px solid #333; background: #1a1a1a; color: #e0e0e0;
            font-size: 0.95rem; width: 100%;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button {
            padding: 0.6rem 1.2rem; border-radius: 6px; border: none;
            background: #3b82f6; color: #fff; font-size: 0.95rem; cursor: pointer;
            white-space: nowrap;
        }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: default; }
        button.danger { background: #dc2626; }
        button.danger:hover { background: #b91c1c; }

        /* Join form */
        #join-form {
            display: flex; flex-direction: column; gap: 0.75rem;
            max-width: 320px; margin: auto; padding: 2rem;
        }
        #join-form h1 { margin-bottom: 0.5rem; }

        /* Room view */
        #room-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }

        .room-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.9rem 1.25rem; border-bottom: 1px solid #222;
            gap: 1rem; flex-shrink: 0;
        }
        .room-header-left { display: flex; align-items: baseline; gap: 0.75rem; }
        .tag { font-size: 0.8rem; background: #1e3a5f; color: #60a5fa; padding: 0.2rem 0.6rem; border-radius: 4px; }

        .body { display: flex; flex: 1; overflow: hidden; }

        /* Members sidebar */
        .sidebar {
            width: 190px; flex-shrink: 0; border-right: 1px solid #222;
            padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem;
        }

        /* Chat mode toggles */
        .mode-toggles { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .mode-btn {
            flex: 1; padding: 0.3rem 0.4rem; font-size: 0.75rem; border-radius: 5px;
            background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; cursor: pointer;
            text-align: center;
        }
        .mode-btn:hover { background: #222; color: #ccc; border-color: #444; }
        .mode-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #60a5fa; }

        #members-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
        #members-list li {
            font-size: 0.88rem; padding: 0.35rem 0.5rem;
            border-radius: 5px; background: #1a1a1a;
            display: flex; align-items: center; gap: 0.4rem;
            transition: background 0.1s, border-color 0.1s;
            border: 1px solid transparent;
        }
        #members-list li[data-peer-id]:not(.self-peer):hover { cursor: pointer; background: #222; }
        #members-list li.selected { background: #0d1f3c; border-color: #3b82f6; }
        .online-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #34d399; flex-shrink: 0;
        }
        .member-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .you-tag { color: #60a5fa; font-size: 0.75rem; flex-shrink: 0; }

        /* Chat area */
        .chat-area { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        #messages {
            flex: 1; overflow-y: auto; padding: 1rem;
            display: flex; flex-direction: column; gap: 0.6rem;
        }

        .message { display: flex; flex-direction: column; max-width: 72%; }
        .message.self { align-self: flex-end; align-items: flex-end; }
        .message.other { align-self: flex-start; }
        .message.system { align-self: center; max-width: 100%; }

        .message-meta { display: flex; gap: 0.4rem; align-items: baseline; margin-bottom: 0.2rem; flex-wrap: wrap; }
        .message.self .message-meta { flex-direction: row-reverse; }
        .sender { font-size: 0.8rem; font-weight: 600; color: #aaa; }
        .message.self .sender { color: #60a5fa; }
        .time { font-size: 0.72rem; color: #555; }

        /* Message type badges */
        .msg-badge {
            font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 4px;
            font-weight: 500; white-space: nowrap;
        }
        .badge-dm { background: #1e1e4f; color: #818cf8; border: 1px solid #3730a3; }
        .badge-group { background: #1a2e1a; color: #4ade80; border: 1px solid #166534; }

        .message-body {
            padding: 0.5rem 0.75rem; border-radius: 10px;
            font-size: 0.92rem; line-height: 1.4; word-break: break-word;
        }
        .message.other .message-body { background: #1e1e1e; border-radius: 2px 10px 10px 10px; }
        .message.self .message-body { background: #1e3a5f; color: #bfdbfe; border-radius: 10px 2px 10px 10px; }
        .message.system .message-body { background: transparent; color: #555; font-size: 0.82rem; font-style: italic; text-align: center; }

        /* DM/Group tinted backgrounds */
        .message.dm-msg.other .message-body { background: #1a1a3a; }
        .message.dm-msg.self .message-body { background: #1e1e5f; }
        .message.group-msg.other .message-body { background: #1a2a1a; }
        .message.group-msg.self .message-body { background: #1a3a1a; }

        .input-area {
            border-top: 1px solid #222; padding: 0.6rem 1rem;
            display: flex; flex-direction: column; gap: 0.3rem; flex-shrink: 0;
        }
        #typing-indicator { font-size: 0.78rem; color: #60a5fa; min-height: 1.1em; padding-left: 0.25rem; }

        /* Recipient banner */
        #recipient-banner {
            display: none; font-size: 0.78rem; color: #a5b4fc;
            background: #0d1230; border: 1px solid #3730a3;
            border-radius: 5px; padding: 0.25rem 0.6rem;
        }

        .input-row { display: flex; gap: 0.5rem; }
        #message-input { flex: 1; }

        /* Message hover actions */
        .message-actions {
            display: flex; gap: 0.25rem; margin-top: 0.2rem;
            opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }
        .message:hover .message-actions { opacity: 1; pointer-events: auto; }
        .message.self .message-actions { justify-content: flex-end; }
        .action-btn {
            background: none; border: 1px solid #2a2a2a; color: #555;
            border-radius: 4px; padding: 0.15rem 0.35rem; font-size: 0.72rem; cursor: pointer;
        }
        .action-btn:hover { background: #1e1e1e; color: #aaa; border-color: #444; }

        /* Reactions */
        .reactions { display: flex; flex-wrap: wrap; gap: 0.2rem; margin-top: 0.25rem; }
        .reaction-chip {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 0.1rem 0.4rem; font-size: 0.8rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.15rem;
        }
        .reaction-chip:hover { background: #222; }
        .reaction-chip.mine { border-color: #3b82f6; background: #0d1f3c; }

        /* Edited label */
        .edited-label { font-size: 0.68rem; color: #444; font-style: italic; margin-left: 0.3rem; }

        /* Inline edit */
        .edit-input {
            width: 100%; background: #111; border: 1px solid #3b82f6;
            color: #e0e0e0; border-radius: 5px; padding: 0.3rem 0.5rem; font-size: 0.9rem;
        }

        /* Reaction picker */
        .reaction-picker {
            position: fixed; background: #1e1e1e; border: 1px solid #333;
            border-radius: 10px; padding: 0.3rem 0.4rem;
            display: flex; gap: 0.15rem; box-shadow: 0 4px 14px rgba(0,0,0,0.5); z-index: 100;
        }
        .reaction-picker button {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            padding: 0.2rem; border-radius: 6px; line-height: 1;
        }
        .reaction-picker button:hover { background: #333; }
    </style>
</head>
<body>

    <div id="join-form">
        <h1>RTCForge — Chat</h1>
        <input id="peer-id" placeholder="Your name (peer ID)" />
        <input id="room-id" placeholder="Room ID" value="general" />
        <button id="join-btn">Join Room</button>
        <p style="font-size:0.8rem;color:#555">Signaling server: ws://localhost:3001</p>
    </div>

    <div id="room-view">
        <div class="room-header">
            <div class="room-header-left">
                <h1 id="room-title"></h1>
                <span class="tag" id="my-peer-tag"></span>
            </div>
            <button id="leave-btn" class="danger">Leave</button>
        </div>

        <div class="body">
            <aside class="sidebar">
                <div>
                    <h2>Mode</h2>
                    <div class="mode-toggles">
                        <button id="mode-broadcast" class="mode-btn active" title="Send to everyone">All</button>
                        <button id="mode-dm" class="mode-btn" title="Send a direct message">DM</button>
                        <button id="mode-group" class="mode-btn" title="Send to a group">Group</button>
                    </div>
                </div>
                <div>
                    <h2>Members</h2>
                    <ul id="members-list"></ul>
                </div>
            </aside>

            <div class="chat-area">
                <div id="messages"></div>
                <div class="input-area">
                    <div id="typing-indicator"></div>
                    <div id="recipient-banner"></div>
                    <div class="input-row">
                        <input id="message-input" placeholder="Message everyone…" autocomplete="off" />
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
