<!doctype html>
<meta charset="utf-8" />
<title>RTCForge — Chat example</title>
<style>
  body { font: 15px system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  #log { border: 1px solid #ccc; border-radius: 8px; height: 320px; overflow-y: auto; padding: .5rem; }
  #log div { padding: 2px 0; }
  .sys { color: #888; font-style: italic; }
  form { display: flex; gap: .5rem; margin-top: .5rem; }
  input { flex: 1; padding: .5rem; }
  button { padding: .5rem 1rem; }
</style>
<h1>RTCForge Chat</h1>
<p class="sys">Room: <b>general</b>. Open this file in a second tab to chat.</p>
<div id="log"></div>
<form id="f">
  <input id="msg" placeholder="Type a message…" autocomplete="off" />
  <button>Send</button>
</form>

<script type="module">
  // Zero-build: import rtcforge straight from esm.sh.
  import { createClient, RoomEvent } from "https://esm.sh/rtcforge/client";

  const log = document.getElementById("log");
  const add = (html, cls = "") => {
    const el = document.createElement("div");
    if (cls) el.className = cls;
    el.innerHTML = html;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  };

  // Random peer id so each tab is a distinct user. Token = "<peerId>:<roomId>".
  const me = "user-" + Math.random().toString(36).slice(2, 6);
  const client = createClient({ serverUrl: "ws://localhost:3001", token: `${me}:general` });
  const room = await client.joinRoom("general");
  add(`Connected as <b>${me}</b>`, "sys");

  room.on(RoomEvent.PeerJoined, (peerId) => add(`${peerId} joined`, "sys"));
  room.on(RoomEvent.PeerLeft, (peerId) => add(`${peerId} left`, "sys"));

  // One "broadcast" event carries (from, channel, data) — filter by channel.
  room.on("broadcast", (from, channel, data) => {
    if (channel === "chat") add(`<b>${from}:</b> ${data.text}`);
  });

  document.getElementById("f").addEventListener("submit", (e) => {
    e.preventDefault();
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;
    room.broadcast("chat", { text, at: Date.now() });
    add(`<b>${me} (you):</b> ${text}`);
    input.value = "";
  });
</script>
